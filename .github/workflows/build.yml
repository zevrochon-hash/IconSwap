name: Build IconSwap

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Fix project compatibility
        run: |
          # Fix Xcode project format
          sed -i '' 's/objectVersion = 77;/objectVersion = 60;/g' IconSwap.xcodeproj/project.pbxproj
          
          # Force Swift 5
          sed -i '' 's/SWIFT_VERSION = 6.0;/SWIFT_VERSION = 5.0;/g' IconSwap.xcodeproj/project.pbxproj

      - name: "Build (Universal: Intel + Apple Silicon)"
        run: |
          xcodebuild \
            -project IconSwap.xcodeproj \
            -scheme IconSwap \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: IconSwap
          path: build/Build/Products/Release/
